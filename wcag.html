<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevUtils</title>
    <link rel="stylesheet" href="style.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">

    <style>
        /* Base layout adjustments for left-alignment and spacing */
        body {
            font-family: 'Lexend', sans-serif;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 0; /* Aligns container to the far left */
            padding: 3rem 2rem; /* Generous breathing room around the content */
            display: flex;
            flex-direction: column;
            gap: 2.5rem; /* Space between inputs and results sections */
        }

        .inputs {
            display: flex;
            flex-direction: column;
            gap: 1.5rem; /* Increased vertical space between input groups */
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem; /* Space between label and its input */
        }

        label {
            font-size: 1.2rem;
            font-weight: 500;
        }

        input[type="text"] {
            padding: 0.75rem 1rem; /* More breathing room inside the boxes */
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 100%;
            max-width: 250px; /* Kept close to your original size but adaptable */
            font-family: 'Lexend', sans-serif;
            box-sizing: border-box;
        }

        .results {
            margin-top: 0;
            display: flex;
            flex-direction: column;
            gap: 0.75rem; /* Breathes out the results rows */
        }

        .results p {
            font-size: 1.2rem;
            margin: 0;
        }

        /* KEPT: Your exact original color specifications */
        .pass {
            color: green;
        }

        .fail {
            color: red;
        }

        .neutral {
            color: #666;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="navbar-brand">DevUtils - Contrast Checker</div>
    </header>

    <div class="container">
        <div class="inputs">
            <div class="input-group">
                <label for="fore">Foreground: #</label>
                <input type="text" maxlength="6" id="fore" name="fore" placeholder="000000" />
            </div>

            <div class="input-group">
                <label for="back">Background: #</label>
                <input type="text" maxlength="6" id="back" name="back" placeholder="FFFFFF" />
            </div>
        </div>

        <div class="results">
            <p id="contrast-ratio">Contrast Ratio: <span>1.00</span></p>
            <p id="aa-small-result">WCAG AA (Small Text): <span class="neutral">-</span></p>
            <p id="aaa-small-result">WCAG AAA (Small Text): <span class="neutral">-</span></p>
            <p id="aa-large-result">WCAG AA (Large Text): <span class="neutral">-</span></p>
            <p id="aaa-large-result">WCAG AAA (Large Text): <span class="neutral">-</span></p>
        </div>
    </div>

    <script>
        document.getElementById('fore').addEventListener('input', updateContrast);
        document.getElementById('back').addEventListener('input', updateContrast);

        const contrastRatioEl = document.getElementById('contrast-ratio').querySelector('span');
        const aaSmallResultEl = document.getElementById('aa-small-result').querySelector('span');
        const aaaSmallResultEl = document.getElementById('aaa-small-result').querySelector('span');
        const aaLargeResultEl = document.getElementById('aa-large-result').querySelector('span');
        const aaaLargeResultEl = document.getElementById('aaa-large-result').querySelector('span');

        const wcagCriteria = {
            aaSmall: 4.5,
            aaaSmall: 7,
            aaLarge: 3,
            aaaLarge: 4.5
        };

        const hexToRgb = (hex) => {
            const bigint = parseInt(hex, 16);
            return {
                r: (bigint >> 16) & 255,
                g: (bigint >> 8) & 255,
                b: bigint & 255
            };
        };

        const luminance = (color) => {
            const a = [color.r, color.g, color.b].map((v) => {
                v /= 255;
                return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
            });
            return a[0] * 0.2126 + a[1] * 0.7152 + a[2] * 0.0722;
        };

        const contrastRatio = (fore, back) => {
            const lum1 = luminance(fore);
            const lum2 = luminance(back);
            return (Math.max(lum1, lum2) + 0.05) / (Math.min(lum1, lum2) + 0.05);
        };

        function updateContrast() {
            const foreHex = document.getElementById('fore').value.trim();
            const backHex = document.getElementById('back').value.trim();

            const hexRegex = /^[0-9A-Fa-f]{6}$/;

            if (hexRegex.test(foreHex) && hexRegex.test(backHex)) {
                const foreColor = hexToRgb(foreHex);
                const backColor = hexToRgb(backHex);
                const ratio = contrastRatio(foreColor, backColor).toFixed(2);

                contrastRatioEl.textContent = ratio;

                aaSmallResultEl.textContent = ratio >= wcagCriteria.aaSmall ? 'PASS' : 'FAIL';
                aaSmallResultEl.className = ratio >= wcagCriteria.aaSmall ? 'pass' : 'fail';

                aaaSmallResultEl.textContent = ratio >= wcagCriteria.aaaSmall ? 'PASS' : 'FAIL';
                aaaSmallResultEl.className = ratio >= wcagCriteria.aaaSmall ? 'pass' : 'fail';

                aaLargeResultEl.textContent = ratio >= wcagCriteria.aaLarge ? 'PASS' : 'FAIL';
                aaLargeResultEl.className = ratio >= wcagCriteria.aaLarge ? 'pass' : 'fail';

                aaaLargeResultEl.textContent = ratio >= wcagCriteria.aaaLarge ? 'PASS' : 'FAIL';
                aaaLargeResultEl.className = ratio >= wcagCriteria.aaaLarge ? 'pass' : 'fail';
            } else {
                contrastRatioEl.textContent = '1.00';

                const elements = [aaSmallResultEl, aaaSmallResultEl, aaLargeResultEl, aaaLargeResultEl];
                elements.forEach(el => {
                    el.textContent = '-';
                    el.className = 'neutral';
                });
            }
        }
    </script>

</body>
</html>
