<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cron Parser</title>
<link rel="stylesheet" href="../styles.css">
</head>
<body>

<div class="container">

<h1>Cron Parser</h1>

<input id="cron" placeholder="* * * * *">

<button onclick="check()">Validate</button>

<pre id="out"></pre>

</div>

<script>
function check(){
    const v = document.getElementById("cron").value;
    document.getElementById("out").textContent =
        v.split(" ").length === 5 ? "Valid cron format" : "Invalid cron format";
}
</script>

</body>
</html>
