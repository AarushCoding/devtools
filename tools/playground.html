<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<title>CSS Playground</title>
</head>

<body>

<div class="container">

<h1>CSS Playground</h1>

<!-- BOX SHADOW -->

<h2>Box Shadow Generator</h2>

<div class="controls">

<div class="field">
<label>
X Offset
<span id="xVal"></span>
</label>
<input type="range" id="x" min="-100" max="100" value="10">
</div>

<div class="field">
<label>
Y Offset
<span id="yVal"></span>
</label>
<input type="range" id="y" min="-100" max="100" value="10">
</div>

<div class="field">
<label>
Blur
<span id="blurVal"></span>
</label>
<input type="range" id="blur" min="0" max="120" value="30">
</div>

<div class="field">
<label>
Spread
<span id="spreadVal"></span>
</label>
<input type="range" id="spread" min="-50" max="50" value="0">
</div>

<div class="field">
<label>Color</label>
<input type="color" id="shadowColor" value="#000000">
</div>

<div class="field">
<label>
Opacity
<span id="opacityVal"></span>
</label>
<input type="range" id="opacity" min="0" max="1" step=".01" value=".35">
</div>

<div class="checkbox-field">

<input type="checkbox" id="inset">

<label for="inset">
Inset Shadow
</label>

</div>

</div>

<div class="preview-box" id="shadowPreview">
Preview
</div>

<button
id="copyShadowBtn"
onclick="copyShadow()">

Copy Shadow CSS

</button>

<pre id="shadowOutput"></pre>

<hr>

<!-- TEXT SHADOW -->

<h2>Text Shadow Generator</h2>

<div class="controls">

<div class="field">
<label>
Offset X
<span id="txVal"></span>
</label>
<input type="range" id="tx" min="-50" max="50" value="3">
</div>

<div class="field">
<label>
Offset Y
<span id="tyVal"></span>
</label>
<input type="range" id="ty" min="-50" max="50" value="3">
</div>

<div class="field">
<label>
Blur
<span id="tblurVal"></span>
</label>
<input type="range" id="tblur" min="0" max="80" value="12">
</div>

<div class="field">
<label>Color</label>
<input type="color" id="textColor" value="#5F7FFF">
</div>

</div>

<div class="preview-box text-preview" id="textPreview">
CSS Playground
</div>

<button
id="copyTextBtn"
onclick="copyTextShadow()">

Copy Text Shadow CSS

</button>

<pre id="textOutput"></pre>

<hr>

<!-- GRADIENT -->

<h2>Gradient Generator</h2>

<div class="controls">

<div class="field">

<label>Type</label>

<select id="gradientType">

<option>linear-gradient</option>
<option>radial-gradient</option>

</select>

</div>

<div class="field">

<label>
Angle
<span id="angleVal"></span>
</label>

<input
type="range"
id="angle"
min="0"
max="360"
value="90">

</div>

<div class="field">

<label>Color 1</label>

<input type="color" id="c1" value="#5F7FFF">

</div>

<div class="field">

<label>Color 2</label>

<input type="color" id="c2" value="#ff4d7a">

</div>

</div>

<div
class="gradient-preview"
id="gradientPreview">
</div>

<button
id="copyGradientBtn"
onclick="copyGradient()">

Copy Gradient CSS

</button>

<pre id="gradientOutput"></pre>

</div>

<script>

function rgba(hex,opacity){

const r=parseInt(hex.slice(1,3),16);
const g=parseInt(hex.slice(3,5),16);
const b=parseInt(hex.slice(5,7),16);

return `rgba(${r},${g},${b},${opacity})`;

}

/* BOX SHADOW */

function updateShadow(){

const x =
document.getElementById("x").value;

const y =
document.getElementById("y").value;

const blur =
document.getElementById("blur").value;

const spread =
document.getElementById("spread").value;

const color =
document.getElementById("shadowColor").value;

const opacity =
document.getElementById("opacity").value;

const inset =
document.getElementById("inset").checked
? "inset "
: "";

document.getElementById("xVal")
.textContent =
`${x}px`;

document.getElementById("yVal")
.textContent =
`${y}px`;

document.getElementById("blurVal")
.textContent =
`${blur}px`;

document.getElementById("spreadVal")
.textContent =
`${spread}px`;

document.getElementById("opacityVal")
.textContent =
opacity;

const css =

`${inset}${x}px ${y}px ${blur}px ${spread}px ${rgba(color,opacity)}`;

document.getElementById("shadowPreview")
.style.boxShadow = css;

document.getElementById("shadowOutput")
.textContent =

`box-shadow: ${css};`;

}

/* TEXT SHADOW */

function updateText(){

const x =
document.getElementById("tx").value;

const y =
document.getElementById("ty").value;

const blur =
document.getElementById("tblur").value;

const color =
document.getElementById("textColor").value;

document.getElementById("txVal")
.textContent =
`${x}px`;

document.getElementById("tyVal")
.textContent =
`${y}px`;

document.getElementById("tblurVal")
.textContent =
`${blur}px`;

const css =

`${x}px ${y}px ${blur}px ${color}`;

document.getElementById("textPreview")
.style.textShadow = css;

document.getElementById("textOutput")
.textContent =

`text-shadow: ${css};`;

}

/* GRADIENT */

function updateGradient(){

const type =
document.getElementById("gradientType")
.value;

const angle =
document.getElementById("angle")
.value;

const c1 =
document.getElementById("c1")
.value;

const c2 =
document.getElementById("c2")
.value;

document.getElementById("angleVal")
.textContent =
`${angle}°`;

let css;

if(type==="linear-gradient"){

css =
`linear-gradient(${angle}deg, ${c1}, ${c2})`;

}

else{

css =
`radial-gradient(circle, ${c1}, ${c2})`;

}

document.getElementById("gradientPreview")
.style.background =
css;

document.getElementById("gradientOutput")
.textContent =

`background: ${css};`;

}

/* COPY */

function copied(buttonId,text){

navigator.clipboard.writeText(text);

const btn =
document.getElementById(buttonId);

const original =
btn.textContent;

btn.textContent =
"Copied!";

setTimeout(()=>{

btn.textContent =
original;

},1000);

}

function copyShadow(){

copied(
"copyShadowBtn",
document.getElementById("shadowOutput")
.textContent
);

}

function copyTextShadow(){

copied(
"copyTextBtn",
document.getElementById("textOutput")
.textContent
);

}

function copyGradient(){

copied(
"copyGradientBtn",
document.getElementById("gradientOutput")
.textContent
);

}

/* LISTENERS */

document
.querySelectorAll("input, select")
.forEach(el=>{

el.addEventListener("input",()=>{

updateShadow();
updateText();
updateGradient();

});

});

updateShadow();
updateText();
updateGradient();

</script>

</body>
</html>
